<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar | I Choose You</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="dashboard-layout">

    <nav class="top-nav">
        <div class="nav-logo">
            <i class="fa-solid fa-paw"></i>
            <span>I Choose You</span>
        </div>

        <ul class="nav-links">
            <li><a href="home.html">Home</a></li>
            <li><a href="calendar.html" class="active">Calendar</a></li>
            <li><a href="faq.html">FAQ</a></li>
            <li><a href="#">Tutorial</a></li>
        </ul>

        <div class="nav-logout">
            <a href="login.html" id="logoutBtn">Logout <i class="fa-solid fa-arrow-right-from-bracket"></i></a>
        </div>
    </nav>

    <main class="calendar-page">
        <section class="calendar-panel">
            <div class="month-banner">
                <button type="button" class="month-arrow" aria-label="Previous month">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>

                <div class="month-title">
                    <h1>May<br>2026</h1>
                </div>

                <button type="button" class="month-arrow" aria-label="Next month">
                    <i class="fa-solid fa-chevron-right"></i>
                </button>

                <p>Keep track of your furry friend's schedule.</p>

                <div class="streak-pill">
                    <i class="fa-solid fa-fire"></i>
                    <span>7 Day<br>Streak!</span>
                </div>
            </div>

            <div class="calendar-card">
                <div class="weekday-row">
                    <span>Sun</span>
                    <span>Mon</span>
                    <span>Tue</span>
                    <span>Wed</span>
                    <span>Thu</span>
                    <span>Fri</span>
                    <span>Sat</span>
                </div>

                <div class="date-grid" id="dateGrid"></div>
            </div>
        </section>

        <aside class="care-card">
            <h2><i class="fa-solid fa-calendar-day"></i> Upcoming Schedule</h2>

            <div class="care-list">
                <article class="care-item">
                    <span class="care-icon green"><i class="fa-solid fa-stethoscope"></i></span>
                    <div>
                        <h3>Annual Checkup</h3>
                        <p>Oct 2 - 10:00 AM</p>
                    </div>
                </article>

                <article class="care-item">
                    <span class="care-icon pink"><i class="fa-solid fa-scissors"></i></span>
                    <div>
                        <h3>Grooming Appointment</h3>
                        <p>Oct 12 - 2:30 PM</p>
                    </div>
                </article>

                <article class="care-item">
                    <span class="care-icon yellow"><i class="fa-solid fa-bowl-food"></i></span>
                    <div>
                        <h3>Buy New Food</h3>
                        <p>Oct 15 - All Day</p>
                    </div>
                </article>
            </div>

            <button type="button" class="add-event-btn">
                <i class="fa-solid fa-plus"></i> Add Event
            </button>
        </aside>
    </main>

    <script src="../js/calendar.js"></script>
</body>
</html>
