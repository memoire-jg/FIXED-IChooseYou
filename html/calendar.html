<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar | I Choose You</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="dashboard-layout">

    <nav class="top-nav">
        <div class="nav-logo">
            <i class="fa-solid fa-paw"></i>
            <span>I Choose You</span>
        </div>

        <ul class="nav-links">
            <li><a href="home.html">Home</a></li>
            <li><a href="calendar.html" class="active">Calendar</a></li>
            <li><a href="faq.html">FAQ</a></li>
            <li><a href="#">Tutorial</a></li>
        </ul>

        <div class="nav-logout">
            <a href="login.html" id="logoutBtn">Logout <i class="fa-solid fa-arrow-right-from-bracket"></i></a>
        </div>
    </nav>

    <main class="calendar-page">
        <section class="calendar-panel">
            <div class="month-banner">
                <button type="button" class="month-arrow" id="prevMonthBtn" aria-label="Previous month">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>

                <div class="month-title">
                    <h1 id="monthYearDisplay">May<br>2026</h1>
                </div>

                <button type="button" class="month-arrow" id="nextMonthBtn" aria-label="Next month">
                    <i class="fa-solid fa-chevron-right"></i>
                </button>

                <p>Keep track of your furry friend's schedule.</p>

                <div class="streak-pill">
                    <i class="fa-solid fa-fire"></i>
                    <span>7 Day<br>Streak!</span>
                </div>
            </div>

            <div class="calendar-card">
                <div class="weekday-row">
                    <span>Sun</span>
                    <span>Mon</span>
                    <span>Tue</span>
                    <span>Wed</span>
                    <span>Thu</span>
                    <span>Fri</span>
                    <span>Sat</span>
                </div>

                <div class="date-grid" id="dateGrid"></div>
            </div>
        </section>

        <aside class="care-card">
            <h2><i class="fa-solid fa-calendar-day"></i> Upcoming Care</h2>

            <div class="care-list" id="careList">
                
            </div>

            <button type="button" class="add-event-btn" id="openAddEventBtn">
                <i class="fa-solid fa-plus"></i> Add Event
            </button>
        </aside>

        <div id="addEventModal" class="modal-overlay">
            <div class="modal-content add-event-modal-content">
                
                <div class="edit-modal-header">
                    <h2>Add New Event</h2>
                    <button class="close-modal-btn" id="closeAddEventBtn">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
                
                <div class="modal-body edit-modal-body">
                    <form id="addEventForm">
                        <div class="input-group">
                            <label>Event Name</label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-pen icon"></i>
                                <input type="text" id="newEventName" placeholder="e.g., Vet Checkup, Buy Food..." required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="input-group">
                                <label id="addEventMonthLabel">Date (May 2026)</label>
                                <div class="input-wrapper">
                                    <select id="newEventDate" class="custom-select">
                                        
                                    </select>
                                </div>
                            </div>
                            <div class="input-group">
                                <label>Time</label>
                                <div class="input-wrapper">
                                    <input type="time" id="newEventTime" required>
                                </div>
                            </div>
                        </div>

                        <div class="input-group" style="margin-top: 5px;">
                            <label>Event Category</label>
                            <div class="animal-type-selector">
                                <label>
                                    <input type="radio" name="eventType" value="checkup" checked>
                                    <span><i class="fa-solid fa-stethoscope" style="margin-right: 4px;"></i> Checkup</span>
                                </label>
                                <label>
                                    <input type="radio" name="eventType" value="grooming">
                                    <span><i class="fa-solid fa-scissors" style="margin-right: 4px;"></i> Grooming</span>
                                </label>
                                <label>
                                    <input type="radio" name="eventType" value="food">
                                    <span><i class="fa-solid fa-bowl-food" style="margin-right: 4px;"></i> Food</span>
                                </label>
                            </div>
                        </div>
                    </form>
                </div>
                
                <div class="edit-modal-footer">
                    <button type="button" class="btn-cancel" id="cancelAddEventBtn">Cancel</button>
                    <button type="button" class="btn-save" id="saveAddEventBtn">Save Event</button>
                </div>
                
            </div>
        </div>
    </main>

    <script src="../js/calendar.js"></script>
    <script src="../js/tutorial.js"></script>
</body>
</html>
