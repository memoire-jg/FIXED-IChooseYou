<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | I Choose You</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="dashboard-layout">
    <nav class="top-nav">
        <div class="nav-logo">
            <i class="fa-solid fa-paw"></i>
            <span>I Choose You</span>
        </div>
        <ul class="nav-links">
            <li><a href="#" class="active">Home</a></li>
            <li><a href="calendar.html">Calendar</a></li>
            <li><a href="faq.html">FAQ</a></li>
            <li><a href="#">Tutorial</a></li>
        </ul>
        <div class="nav-logout">
            <a href="login.html" id="logoutBtn">Logout <i class="fa-solid fa-arrow-right-from-bracket"></i></a>
        </div>
    </nav>

    <main class="main-content">
        <section class="welcome-section">
            <h1>Welcome back, <span id="displayUsername">Pet Parent</span>!</h1>
            <p>Your furry (and scaly) friends are doing great. Here's an overview of your companions.</p>
            <button class="add-pet-btn" id="addPetBtn">
                <i class="fa-solid fa-plus"></i> Add Pet
            </button>
        </section>

        <section class="pet-grid" id="petGrid">
        </section>
        
        <div id="addPetModal" class="modal-overlay">
            <div class="modal-content">
                <div class="modal-header">
                    <div class="modal-icon">
                        <i class="fa-solid fa-heart"></i>
                    </div>
                    <button class="close-modal-btn" id="closeModalBtn">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
                <div class="modal-body">
                    <h2>Add a New Friend</h2>
                    <p class="modal-subtitle">Tell us a little about the newest member of your family.</p>
                    <form id="addPetForm">
                        <div class="input-group">
                            <label>What is their name?</label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-pen icon"></i>
                                <input type="text" id="newPetName" placeholder="e.g. Bella, Charlie..." required>
                            </div>
                        </div>
                        <div class="input-group">
                            <label>What kind of animal are they?</label>
                            <div class="animal-type-selector">
                                <label>
                                    <input type="radio" name="animalType" value="Dog" checked>
                                    <span>Dog</span>
                                </label>
                                <label>
                                    <input type="radio" name="animalType" value="Cat">
                                    <span>Cat</span>
                                </label>
                                <label>
                                    <input type="radio" name="animalType" value="Fish">
                                    <span>Fish</span>
                                </label>
                                <label>
                                    <input type="radio" name="animalType" value="Bird">
                                    <span>Bird</span>
                                </label>
                                <label>
                                    <input type="radio" name="animalType" value="Bunny">
                                    <span>Bunny</span>
                                </label>
                            </div>
                        </div>
                        <div class="input-group">
                            <label>Species or Breed <span style="color: var(--text-muted); font-weight: 400;">(Optional)</span></label>
                            <div class="input-wrapper">
                                <input type="text" id="newPetBreed" placeholder="e.g. Golden Retriever, Siamese...">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="input-group">
                                <label>Weight (kg)</label>
                                <div class="input-wrapper">
                                    <input type="text" id="newPetWeight" placeholder="e.g. 2, 5..." required>
                                </div>
                            </div>
                            <div class="input-group">
                                <label>Age (Years)</label>
                                <div class="input-wrapper">
                                    <input type="text" id="newPetAge" placeholder="e.g. 2 Yrs, 4.5 Yrs..." required>
                                </div>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn-cancel" id="cancelPetBtn">Cancel</button>
                            <button type="submit" class="btn-save">Save Friend</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        
    </main>
    <script src="../js/home.js"></script>
</body>
</html>
